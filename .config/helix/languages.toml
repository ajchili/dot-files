[[language]]
name = "python"
language-servers = [ "ruff", "cspell" ]
formatter = { command = "ruff", args = ["format", "-"] }
auto-format = true

[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.cspell]
command = "cspell-lsp"
args = ["--stdio"]
