[[language]]
name = "java"
language-servers = [ "jdtls", "cspell" ]

[[language]]
name = "javascript"
language-servers = [ "typescript-language-server", "cspell" ]
formatter = { command = "npx", args = ["--no-install", "prettier", "--parser", "babel"] }
auto-format = true

